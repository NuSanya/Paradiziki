name: CI
on:
  push:
    branches:
      - master220
      - whitelist220
      - testmerge
      - tutorial
      - dev
  pull_request:
    branches:
      - master220
      - whitelist220
      - tutorial
  merge_group:
  workflow_call:
  workflow_run:
    workflows: ["Build and verify Rust library"]
    types: [completed]

jobs:
  run_linters:
    name: Run Linters
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: $HOME/SpacemanDMM
          key: ${{ runner.os }}-spacemandmm

      - name: Install Tools
        run: |
          bash tools/ci/install_build_deps.sh
          bash tools/ci/install_dreamchecker.sh

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.6'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: ./tgui/yarn.lock

      - name: Install python packages
        run: pip install -r tools/requirements.txt

      - name: Run Linters
        run: |
          bash tools/ci/check_json.sh
          tgui/bin/tgui --ci
          python tools/ci/check_grep.py
          python tools/ci/check_grep2.py
          python tools/ci/check_line_endings.py
          python tools/ci/unticked_files.py ${GITHUB_WORKSPACE}
          python tools/ci/illegal_dme_files.py ${GITHUB_WORKSPACE}
          python tools/ci/define_sanity.py
          python tools/ci/no_duplicate_definitions.py
          python tools/ci/identical_variables.py
          python tools/ci/check_icons.py
          python tools/ci/trait_validity.py
          python tools/ci/alphabetical_check.py
          python -m tools.maplint.source --github

      - name: Run DreamChecker
        shell: bash
        run: ~/dreamchecker 2>&1 | bash tools/ci/annotate_dm.sh

  odlint:
    name: Lint with OpenDream
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup OD
        run: |
          bash tools/ci/setup_od.sh
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: 9.x
      - name: Run OD
        run: |
          bash tools/ci/run_od.sh | bash tools/ci/annotate_od.sh

  compile_all_maps:
    name: Compile All Maps
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore BYOND from Cache
        uses: ./.github/actions/restore_or_install_byond
        with:
          release: 'STABLE'
      - name: Compile All Maps
        run: |
          tools/ci/install_byond.sh
          source $HOME/BYOND/byond/bin/byondsetup
          tools/ci/generate_maplist.sh
          tools/ci/dm.sh -Mci_map_testing paradise.dme

  unit_tests_and_sql:
    name: Unit Tests + SQL Validation
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false # Let all map tests run to completion
      matrix:
        maptype:
          [
            '/datum/map/cyberiad',
            '/datum/map/delta',
            '/datum/map/cerestation',
            '/datum/map/celestation',
            '/datum/map/nova',
          ]
        byondtype: ['STABLE']
    services:
      mariadb:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306
        options: --health-cmd "mariadb-admin ping" --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Restore BYOND from Cache
        uses: ./.github/actions/restore_or_install_byond
        with:
          release: ${{ matrix.byondtype }}
      - name: Setup & Validate DB
        run: |
          sudo systemctl start mysql
          python3 tools/ci/generate_sql_scripts.py
          tools/ci/validate_sql.sh
      - name: Install RUST_G Deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update || true
          sudo apt install libgcc-s1:i386
          bash tools/ci/install_rustg.sh
      - name: Install DMJIT
        run: |
          sudo apt install libncurses6:i386
          bash tools/ci/install_dmjit.sh
      - name: Compile & Run Unit Tests
        run: |
          tools/ci/install_byond.sh '${{ matrix.byondtype }}'
          source $HOME/BYOND/byond/bin/byondsetup
          tools/ci/dm.sh -DMULTIINSTANCE -DCIBUILDING paradise.dme
          echo '${{ matrix.maptype }}' > data/next_map.txt
          tools/ci/run_server.sh
