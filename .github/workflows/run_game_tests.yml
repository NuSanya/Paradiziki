name: Run SQL Validation + Game Tests

on:
  workflow_call:

jobs:
  game_tests:
    name: Run SQL Validation + Game Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        byondtype: ['STABLE']
    steps:
      - uses: actions/checkout@v6

      - name: Restore BYOND from Cache
        uses: ./.github/actions/restore_or_install_byond
        with:
          release: ${{ matrix.byondtype }}

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-game
          path: ./

      - name: Setup & Validate DB
        run: |
          sudo systemctl start mysql
          python3 tools/ci/generate_sql_scripts.py
          tools/ci/validate_sql.sh

      - name: Install RUST_G
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update || true
          sudo apt install libgcc-s1:i386
          sudo apt install libcurl4:i386
          bash tools/ci/install_rustg.sh

      - name: Run Game Tests
        run: |
          source $HOME/BYOND/byond/bin/byondsetup
          mkdir -p data
          echo '/datum/map/test_tiny' > data/next_map.txt
          tools/ci/run_server.sh
