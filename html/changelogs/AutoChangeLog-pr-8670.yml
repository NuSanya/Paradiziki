  - bugfix: "ИИ больше не может подключаться к оболочкам, если разряжен.\nсode_imp: Улучшение кода БОРИС модуля и боргов.\nсode_imp: Сообщения оболочек теперь тоже подсвечиваются большими буквами в бинарном канале.\nсode_imp: Вход и выход ИИ из оболочки теперь логируется. Буквально 1984. (PR #8670)"
