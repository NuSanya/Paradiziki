help: "Use the specific directional subtypes for this apc."
/obj/machinery/power/apc:
  banned_variables:
    - pixel_x
    - pixel_y
    - dir
    - name

/obj/machinery/power/apc/important_area:
  banned_variables:
    - cell_type

/obj/machinery/power/apc/generator:
  banned_variables:
